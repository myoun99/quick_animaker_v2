name: CI

# The cheap tier: analyze, the full test suite, and a portability check on
# the native C core. Runs on every push and PR (Linux/Windows minutes are
# free for this public repository).
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.2'

jobs:
  # The C core compiled by a THIRD compiler (gcc) on a different OS —
  # the fastest way to catch portability breakage before the platform
  # builds get involved. Two minutes, every push.
  native-portability:
    name: native C (gcc + clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build with gcc
        run: |
          cmake -S packages/qa_native/src -B build/ci-gcc -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc
          cmake --build build/ci-gcc --config Release
      - name: Build with clang (stricter warnings)
        run: |
          cmake -S packages/qa_native/src -B build/ci-clang -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang
          cmake --build build/ci-clang --config Release
      - name: Show artifacts
        run: ls -la build/ci-gcc build/ci-clang

  analyze-and-test:
    name: analyze + full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      # The parity suites resolve a locally built engine or SKIP. This job
      # used to run without one — the gcc build lives in a different job on
      # a different runner, so its artifacts were never here — which meant
      # every byte-parity pin quietly skipped on Linux. gcc on x86_64 is a
      # genuinely distinct third compiler from MSVC and Apple clang, and
      # #614 is the standing lesson about what an unexercised parity suite
      # is worth: it stayed green for five rounds while Apple silicon
      # rendered different pixels.
      - name: Build native engine (parity suites need a real binary)
        run: |
          cmake -S packages/qa_native/src -B build/native_standalone \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native_standalone --config Release
      # The project's green rule: the exit code decides, never the tail.
      - name: Run tests against the gcc-built engine
        env:
          QA_ENGINE_PATH: ${{ github.workspace }}/build/native_standalone/libqa_engine.so
          QA_REQUIRE_NATIVE: '1'
        run: flutter test

  android:
    name: Android build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v5
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn
          retention-days: 7

  windows:
    name: Windows + native DLL
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      # The engine DLL the parity tests need; without it those tests skip
      # loudly rather than fail, so building it here is what actually
      # exercises the C implementation against the Dart reference.
      - name: Build native engine (Release)
        run: |
          cmake -S packages/qa_native/src -B build/native_standalone
          cmake --build build/native_standalone --config Release
      - name: Run tests with the engine on PATH
        env:
          QA_ENGINE_PATH: build/native_standalone/Release/qa_engine.dll
          QA_REQUIRE_NATIVE: '1'
        run: flutter test
